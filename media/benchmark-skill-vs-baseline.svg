<svg xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" viewBox="0 0 860 412"><title>planning-with-files eval results: with skill vs without, four metrics</title><text x="20" y="26" fill="#8b949e" font-size="15" font-weight="600">Does the agent actually keep the plan on disk? 5 tasks, 10 subagents, 30 checked assertions.</text><text x="20" y="45" fill="#8b949e" font-size="12" opacity=".85">Anthropic skill-creator eval framework · claude-sonnet-4-6 · 2026-03-06 · skill v2.21.0 · higher is better</text><rect width="12" height="12" x="20" y="58" fill="#2da44e" rx="2"/><text x="38" y="69" fill="#8b949e" font-size="13">with planning-with-files</text><rect width="12" height="12" x="210" y="58" fill="#8b949e" rx="2"/><text x="228" y="69" fill="#8b949e" font-size="13">without (same tasks, no skill)</text><text x="20" y="100" fill="#8b949e" font-size="13" font-weight="600">Assertions passed (of 30)</text><rect width="491" height="14" x="20" y="108" fill="#2da44e" rx="2"/><text x="519" y="119" fill="#2da44e" font-size="12" font-weight="600">29/30 · 96.7%</text><rect width="34" height="14" x="20" y="126" fill="#8b949e" rx="2"/><text x="62" y="137" fill="#8b949e" font-size="12">2/30 · 6.7%</text><text x="20" y="172" fill="#8b949e" font-size="13" font-weight="600">3-file pattern followed (of 5 evals)</text><rect width="508" height="14" x="20" y="180" fill="#2da44e" rx="2"/><text x="536" y="191" fill="#2da44e" font-size="12" font-weight="600">5/5</text><rect width="3" height="14" x="20" y="198" fill="#8b949e" rx="1"/><text x="31" y="209" fill="#8b949e" font-size="12">0/5</text><text x="20" y="244" fill="#8b949e" font-size="13" font-weight="600">Blind A/B wins (of 3)</text><rect width="508" height="14" x="20" y="252" fill="#2da44e" rx="2"/><text x="536" y="263" fill="#2da44e" font-size="12" font-weight="600">3/3</text><rect width="3" height="14" x="20" y="270" fill="#8b949e" rx="1"/><text x="31" y="281" fill="#8b949e" font-size="12">0/3</text><text x="20" y="316" fill="#8b949e" font-size="13" font-weight="600">Average rubric score (of 10)</text><rect width="508" height="14" x="20" y="324" fill="#2da44e" rx="2"/><text x="536" y="335" fill="#2da44e" font-size="12" font-weight="600">10.0</text><rect width="345" height="14" x="20" y="342" fill="#8b949e" rx="2"/><text x="373" y="353" fill="#8b949e" font-size="12">6.8</text><text x="20" y="384" fill="#8b949e" font-size="11" opacity=".8">Measures 3-file workflow fidelity, not long-run goal drift. Bars within each group share one linear scale.</text><text x="20" y="400" fill="#8b949e" font-size="11" opacity=".8">Full method, dataset, and per-assertion list: docs/evals.md</text></svg>